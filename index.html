<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div id="answer" class="answer loading">Loading...</div>
        <div id="record" class="record"></div>
        
        <div id="season-selector" class="season-selector">
            <button id="season-first" class="season-nav season-nav-jump" aria-label="Earliest season">&laquo;&lsaquo;</button>
            <button id="season-prev10" class="season-nav season-nav-jump" aria-label="Back 10 years">&#171;</button>
            <button id="season-prev" class="season-nav" aria-label="Previous season">&#8249;</button>
            <span id="season-label" class="season-label"></span>
            <button id="season-next" class="season-nav" aria-label="Next season">&#8250;</button>
            <button id="season-next10" class="season-nav season-nav-jump" aria-label="Forward 10 years">&#187;</button>
            <button id="season-last" class="season-nav season-nav-jump" aria-label="Latest season">&rsaquo;&raquo;</button>
        </div>

        <div id="schedule" class="schedule-section">
            <h3 id="schedule-title">📅 Schedule</h3>
            <div id="schedule-grid" class="schedule-grid">
                <div class="loading">Loading schedule...</div>
            </div>
        </div>
        
        <div id="last-updated" class="last-updated"></div>
        
        <div class="share-section">
            <h3>Share</h3>
            <button id="share-copy" class="share-btn">
                <span class="share-icon">📋</span>
                Copy to Share
            </button>
        </div>
    </div>
    
    <script src="main.js" type="module"></script>
</body>
</html>
