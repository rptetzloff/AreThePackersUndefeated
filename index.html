<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div id="answer" class="answer loading">Loading...</div>
        <div id="record" class="record"></div>
        
        <div id="season-selector" class="season-selector">
            <button id="season-first" class="season-nav season-nav-jump" aria-label="Earliest season"><i class="mdi mdi-chevron-triple-left"></i></button>
            <button id="season-prev10" class="season-nav season-nav-jump" aria-label="Back 10 years"><i class="mdi mdi-chevron-double-left"></i></button>
            <button id="season-prev" class="season-nav" aria-label="Previous season"><i class="mdi mdi-chevron-left"></i></button>
            <span id="season-label" class="season-label"></span>
            <button id="season-next" class="season-nav" aria-label="Next season"><i class="mdi mdi-chevron-right"></i></button>
            <button id="season-next10" class="season-nav season-nav-jump" aria-label="Forward 10 years"><i class="mdi mdi-chevron-double-right"></i></button>
            <button id="season-last" class="season-nav season-nav-jump" aria-label="Latest season"><i class="mdi mdi-chevron-triple-right"></i></button>
        </div>

        <div id="schedule" class="schedule-section">
            <h3 id="schedule-title"><i class="mdi mdi-calendar-month"></i> Schedule</h3>
            <div id="schedule-grid" class="schedule-grid">
                <div class="loading">Loading schedule...</div>
            </div>
        </div>
        
        <div id="last-updated" class="last-updated"></div>
        <div id="data-credit" class="data-credit" style="display:none">Historical data provided by <a href="https://github.com/nflverse/nflverse-data" target="_blank" rel="noopener noreferrer">nflverse</a> and <a href="https://github.com/fivethirtyeight/nfl-elo-game" target="_blank" rel="noopener noreferrer">FiveThirtyEight</a></div>

        <div id="last-undefeated" class="last-undefeated"></div>

        <div class="share-section">
            <h3>Share</h3>
            <button id="share-copy" class="share-btn">
                <i class="mdi mdi-clipboard-outline share-icon"></i>
                Copy to Share
            </button>
        </div>
    </div>
    
    <footer class="site-footer">
        <label class="emoji-toggle-label">
            <input type="checkbox" id="emoji-toggle">
            Show record emojis
        </label>
        <a href="https://github.com/rptetzloff/AreThePackersUndefeated" target="_blank" rel="noopener noreferrer" class="github-link">
            <i class="mdi mdi-github"></i>
            View on GitHub
        </a>
    </footer>

    <div id="lightbox" class="lightbox" role="dialog" aria-modal="true" aria-label="Full size photo" hidden>
        <button id="lightbox-close" class="lightbox-close" aria-label="Close"><i class="mdi mdi-close"></i></button>
        <button id="lightbox-prev" class="lightbox-nav lightbox-nav-prev" aria-label="Previous photo"><i class="mdi mdi-chevron-left"></i></button>
        <button id="lightbox-next" class="lightbox-nav lightbox-nav-next" aria-label="Next photo"><i class="mdi mdi-chevron-right"></i></button>
        <img id="lightbox-img" src="" alt="">
        <div class="lightbox-info">
            <p id="lightbox-caption" class="lightbox-caption"></p>
            <p id="lightbox-license" class="lightbox-license"></p>
        </div>
    </div>

    <div id="photo-gallery-modal" class="gallery-modal" role="dialog" aria-modal="true" aria-label="Season photo gallery" hidden>
        <div class="gallery-backdrop"></div>
        <div class="gallery-dialog">
            <div class="gallery-header">
                <h2 id="gallery-title" class="gallery-title"></h2>
                <button id="gallery-close" class="gallery-close" aria-label="Close gallery"><i class="mdi mdi-close"></i></button>
            </div>
            <div id="gallery-grid" class="gallery-grid"></div>
        </div>
    </div>

    <script src="main.js" type="module"></script>
</body>
</html>
